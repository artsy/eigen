pluginManagement {
  includeBuild("../node_modules/@react-native/gradle-plugin")
  includeBuild("../node_modules/expo-modules-autolinking/android/expo-gradle-plugin")
  includeBuild("../node_modules/expo-modules-core/expo-module-gradle-plugin")
}
plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
  def command = [
    'node',
    '--no-warnings',
    '--eval',
    'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
    'react-native-config',
    '--json',
    '--platform',
    'android'
  ].toList()
  ex.autolinkLibrariesFromCommand(command)
}
expoAutolinking.useExpoModules()
expoAutolinking.useExpoVersionCatalog()

rootProject.name = 'Artsy'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Re-add jcenter() for Gradle 9 compatibility.
// Some node_modules still reference it but it was removed in Gradle 9.
gradle.beforeProject { project ->
    project.buildscript.repositories.metaClass.jcenter = { ->
        delegate.maven { url 'https://jcenter.bintray.com/' }
    }
    project.repositories.metaClass.jcenter = { ->
        delegate.maven { url 'https://jcenter.bintray.com/' }
    }
}
